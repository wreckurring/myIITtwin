# Server
server.port=8080

# H2 file-based database (persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/myiittwin
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Gemini API
gemini.api.key=${GEMINI_API_KEY:your-api-key-here}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# CORS (dev — override with CORS_ALLOWED_ORIGINS env var in prod)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Rate limiting: 10 requests per minute per IP
ratelimit.requests=10
ratelimit.duration.seconds=60
