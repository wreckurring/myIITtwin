services:
  - type: web
    name: myiittwin-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # set to your Vercel URL after deploy
      - key: DB_HOST
        fromDatabase:
          name: myiittwin-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: myiittwin-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: myiittwin-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: myiittwin-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: myiittwin-db
          property: password

databases:
  - name: myiittwin-db
    plan: free
    databaseName: myiittwin
    user: myiittwin
